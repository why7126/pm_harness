services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: tile-info-platform-backend
    env_file:
      - .env
    ports:
      - "${HOST_PORT_BACKEND:-8000}:8000"
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./data/uploads:/app/data/uploads
      - ./data/processed:/app/data/processed
      - ./data/tmp:/app/data/tmp
    depends_on:
      - minio
    networks:
      - tile-info-platform

  web:
    build:
      context: .
      dockerfile: src/web/Dockerfile
    container_name: tile-info-platform-web
    env_file:
      - .env
    ports:
      - "${HOST_PORT_WEB:-3000}:80"
    depends_on:
      - backend
    networks:
      - tile-info-platform

  minio:
    image: minio/minio:latest
    container_name: tile-info-platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${HOST_PORT_MINIO_API:-9000}:9000"
      - "${HOST_PORT_MINIO_CONSOLE:-9001}:9001"
    volumes:
      - ./data/minio:/data
    networks:
      - tile-info-platform

  minio-init:
    image: minio/mc:latest
    container_name: tile-info-platform-minio-init
    depends_on:
      - minio
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/$${MINIO_BUCKET:-tile-info-platform};
      mc anonymous set none local/$${MINIO_BUCKET:-tile-info-platform};
      echo 'MinIO bucket initialized: '$${MINIO_BUCKET:-tile-info-platform};
      "
    networks:
      - tile-info-platform

networks:
  tile-info-platform:
    driver: bridge
