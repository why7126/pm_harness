# purpose: 本地开发与演示部署编排
# content: Docker Compose 服务拓扑、构建上下文、端口映射、环境变量、数据卷、网络和条件启用服务
# source: Harness docker-compose.yml 抽象模板，初始化时基于用户输入、技术栈和部署策略生成
# update_method: 服务组成、端口、环境变量、数据卷、构建方式、对象存储、数据库或部署策略变化时同步更新
# owner: {DEPLOYMENT_OWNER}
# note: 适用于 {PRODUCT_NAME} 项目；生产部署前必须由人工确认安全、凭据、网络和持久化策略

name: ${COMPOSE_PROJECT_NAME:-{PRODUCT_CODE}}

x-harness-metadata:
  document_type: docker-compose
  module_scope: "[通用 + 个性化 + 条件启用]"
  product_name: "{PRODUCT_NAME}"
  product_code: "{PRODUCT_CODE}"
  deployment_stack: "{DEPLOYMENT_STACK}"
  generation_note: "初始化时必须按项目能力替换占位符，并删除未启用 profile 的服务。"

x-common-env: &common-env
  APP_NAME: ${APP_NAME:-{PRODUCT_CODE}}
  APP_ENV: ${APP_ENV:-local}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  TZ: ${TZ:-Asia/Shanghai}

x-common-service: &common-service
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - app-network

services:
  backend:
    <<: *common-service
    build:
      context: ${BACKEND_BUILD_CONTEXT:-./src/backend}
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    image: ${BACKEND_IMAGE:-{PRODUCT_CODE}-backend:local}
    container_name: ${BACKEND_CONTAINER_NAME:-{PRODUCT_CODE}-backend}
    environment:
      <<: *common-env
      SERVICE_NAME: backend
      DATABASE_URL: ${DATABASE_URL:-{DATABASE_URL}}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-{OBJECT_STORAGE_ENDPOINT}}
    ports:
      - "${HOST_PORT_BACKEND:-{HOST_PORT_BACKEND}}:${BACKEND_CONTAINER_PORT:-{BACKEND_CONTAINER_PORT}}"
    volumes:
      - ./data/runtime/backend:/app/data
      - ./data/tmp:/app/tmp
    healthcheck:
      test: ["CMD-SHELL", "${BACKEND_HEALTHCHECK_CMD:-curl -fsS http://localhost:${BACKEND_CONTAINER_PORT:-8000}/health || exit 1}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    <<: *common-service
    profiles:
      - web
    build:
      context: ${WEB_BUILD_CONTEXT:-.}
      dockerfile: ${WEB_DOCKERFILE:-{WEB_DOCKERFILE}}
    image: ${WEB_IMAGE:-{PRODUCT_CODE}-web:local}
    container_name: ${WEB_CONTAINER_NAME:-{PRODUCT_CODE}-web}
    environment:
      <<: *common-env
      SERVICE_NAME: web
      API_BASE_URL: ${API_BASE_URL:-{API_BASE_URL}}
    ports:
      - "${HOST_PORT_WEB:-{HOST_PORT_WEB}}:${WEB_CONTAINER_PORT:-{WEB_CONTAINER_PORT}}"
    depends_on:
      backend:
        condition: service_started

  database:
    <<: *common-service
    profiles:
      - database
    image: ${DATABASE_IMAGE:-{DATABASE_IMAGE}}
    container_name: ${DATABASE_CONTAINER_NAME:-{PRODUCT_CODE}-database}
    environment:
      <<: *common-env
      POSTGRES_DB: ${POSTGRES_DB:-{DATABASE_NAME}}
      POSTGRES_USER: ${POSTGRES_USER:-{DATABASE_USER}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-{DATABASE_PASSWORD}}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-{DATABASE_NAME}}
      MYSQL_USER: ${MYSQL_USER:-{DATABASE_USER}}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-{DATABASE_PASSWORD}}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-{DATABASE_ROOT_PASSWORD}}
    ports:
      - "${HOST_PORT_DATABASE:-{HOST_PORT_DATABASE}}:${DATABASE_CONTAINER_PORT:-{DATABASE_CONTAINER_PORT}}"
    volumes:
      - database-data:/var/lib/database
    healthcheck:
      test: ["CMD-SHELL", "${DATABASE_HEALTHCHECK_CMD:-echo database healthcheck pending}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  object-storage:
    <<: *common-service
    profiles:
      - object-storage
    image: ${OBJECT_STORAGE_IMAGE:-{OBJECT_STORAGE_IMAGE}}
    container_name: ${OBJECT_STORAGE_CONTAINER_NAME:-{PRODUCT_CODE}-object-storage}
    command: ${OBJECT_STORAGE_COMMAND:-{OBJECT_STORAGE_COMMAND}}
    environment:
      <<: *common-env
      OBJECT_STORAGE_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-{OBJECT_STORAGE_ACCESS_KEY}}
      OBJECT_STORAGE_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-{OBJECT_STORAGE_SECRET_KEY}}
    ports:
      - "${HOST_PORT_OBJECT_STORAGE_API:-{HOST_PORT_OBJECT_STORAGE_API}}:${OBJECT_STORAGE_API_PORT:-{OBJECT_STORAGE_API_PORT}}"
      - "${HOST_PORT_OBJECT_STORAGE_CONSOLE:-{HOST_PORT_OBJECT_STORAGE_CONSOLE}}:${OBJECT_STORAGE_CONSOLE_PORT:-{OBJECT_STORAGE_CONSOLE_PORT}}"
    volumes:
      - object-storage-data:/data

  object-storage-init:
    <<: *common-service
    profiles:
      - object-storage
    image: ${OBJECT_STORAGE_INIT_IMAGE:-{OBJECT_STORAGE_INIT_IMAGE}}
    container_name: ${OBJECT_STORAGE_INIT_CONTAINER_NAME:-{PRODUCT_CODE}-object-storage-init}
    depends_on:
      object-storage:
        condition: service_started
    entrypoint: ${OBJECT_STORAGE_INIT_COMMAND:-{OBJECT_STORAGE_INIT_COMMAND}}

  worker:
    <<: *common-service
    profiles:
      - worker
    build:
      context: ${WORKER_BUILD_CONTEXT:-{WORKER_BUILD_CONTEXT}}
      dockerfile: ${WORKER_DOCKERFILE:-{WORKER_DOCKERFILE}}
    image: ${WORKER_IMAGE:-{PRODUCT_CODE}-worker:local}
    container_name: ${WORKER_CONTAINER_NAME:-{PRODUCT_CODE}-worker}
    command: ${WORKER_COMMAND:-{WORKER_COMMAND}}
    environment:
      <<: *common-env
      SERVICE_NAME: worker
    depends_on:
      backend:
        condition: service_started

  algorithm:
    <<: *common-service
    profiles:
      - algorithm
    build:
      context: ${ALGORITHM_BUILD_CONTEXT:-./src/algorithm}
      dockerfile: ${ALGORITHM_DOCKERFILE:-Dockerfile}
    image: ${ALGORITHM_IMAGE:-{PRODUCT_CODE}-algorithm:local}
    container_name: ${ALGORITHM_CONTAINER_NAME:-{PRODUCT_CODE}-algorithm}
    environment:
      <<: *common-env
      SERVICE_NAME: algorithm
      MODEL_DIR: ${MODEL_DIR:-/app/models}
    ports:
      - "${HOST_PORT_ALGORITHM:-{HOST_PORT_ALGORITHM}}:${ALGORITHM_CONTAINER_PORT:-{ALGORITHM_CONTAINER_PORT}}"
    volumes:
      - ./models:/app/models:ro
      - ./data/runtime/algorithm:/app/data

networks:
  app-network:
    name: ${COMPOSE_NETWORK_NAME:-{PRODUCT_CODE}-network}
    driver: bridge

volumes:
  database-data:
    name: ${DATABASE_VOLUME_NAME:-{PRODUCT_CODE}-database-data}
  object-storage-data:
    name: ${OBJECT_STORAGE_VOLUME_NAME:-{PRODUCT_CODE}-object-storage-data}
