project:
  name: 瓷砖信息管理平台
  code: tile-info-platform
  description: 面向瓷砖零售店店主和企业内部员工的瓷砖信息展示、维护、媒体资产管理平台。

users:
  - 瓷砖零售店店主
  - 企业内部员工

channels:
  web_public: true
  wechat_miniapp: true
  web_admin: true

backend:
  language: Python
  version: "3.12"
  framework: FastAPI
  validation: Pydantic
  package_manager: uv
  database: SQLite
  object_storage: MinIO

frontend:
  framework: React19
  language: TypeScript
  css: Tailwind
  component_library: shadcn/ui
  http_client: Axios
  openapi_client: Orval
  package_manager: pnpm

media:
  image_enabled: true
  video_enabled: true
  document_enabled: true
  storage: MinIO
  local_data_dir: data/
  video:
    upload: true
    cover: true
    transcode: optional
    default_format: mp4

deployment:
  mode: docker-compose
  services:
    - backend
    - web
    - minio

ai:
  coding_mode: OpenSpec
  default_language: 中文
  metadata_style: Obsidian YAML Frontmatter
  rules_required: true
  document_governance_required: true

constraints:
  - AI必须遵循当前目录结构
  - 新增功能必须先进入issues和openspec/changes
  - API变更必须同步Orval
  - 媒体上传必须通过后端授权和MinIO
  - .env.example必须与实际配置保持同步
  - data目录不得提交真实客户数据或运行时数据库

# object storage and ports
object_storage:
  strategy: single_bucket_with_prefix
  bucket: tile-info-platform
  prefixes:
    original: original/
    thumbnails: thumbnails/
    processed: processed/
    videos: videos/
    video_covers: videos/covers/
    video_transcoded: videos/transcoded/

ports:
  strategy: container_fixed_host_configurable
  backend_container: 8000
  web_container: 3000
  backend_host_default: 8000
  web_host_default: 3000

governance:
  requirement_source: issues/requirements
  bug_source: issues/bugs
  change_source: openspec/changes
  iteration_source: iterations
  forbidden_dirs:
    - docs/product
    - docs/prd
    - docs/bugs
    - docs/iterations
